<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0a0f1c;
      color: #e2e8f0;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px;
      color: #4ade80;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
    }
    .stat span:last-child { color: #4ade80; font-weight: bold; }
    .footer { font-size: 10px; opacity: 0.5; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <h1>🛡️ AI Radar</h1>
  <div class="status"><span class="pulse"></span>Doimiy kuzatuvda</div>
  <div class="stat"><span>Bloklangan (sessiya)</span><span id="blocked">0</span></div>
  <div class="stat"><span>Til</span><span>O'zbek</span></div>
  <div class="stat"><span>Rejim</span><span>Tezkor</span></div>
  <div class="footer">AI Radar barcha saytlarda faol</div>
  <script src="popup.js"></script>
</body>
</html>
